<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  text-align:center;
  color:white;
  background:black;
  overflow-x:hidden;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:10px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.4);
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:5px;
  z-index:10;
}
.navbar a{
  flex:1;
  min-width:70px;
  padding:6px;
  border-radius:20px;
  background:#ff4e80;
  color:white;
  text-decoration:none;
  font-size:13px;
}

/* CARD */
.card{
  margin-top:120px;
  padding:20px;
  width:90%;
  max-width:500px;
  margin:auto;
  border-radius:20px;
  background:rgba(0,0,0,0.4);
}

.profile{width:40%;max-width:150px;border-radius:50%;}
.cake{width:60%;max-width:220px;margin:20px;}

.btn{
  padding:10px 20px;
  border-radius:20px;
  background:#ff4e80;
  cursor:pointer;
}

/* ENVELOPE */
.envelope{
  display:none;
  position:fixed;
  bottom:15%;
  left:50%;
  transform:translateX(-50%);
  width:220px;
  height:140px;
  perspective:1000px;
  z-index:5;
}
.env-body{
  width:100%;
  height:100%;
  background:white;
  border-radius:10px;
}
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff4e80;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:0.8s;
}
.envelope.open .flap{
  transform:rotateX(-180deg);
}

/* LETTER (FIX UTAMA) */
.letter{
  display:none;
  position:fixed;
  bottom:10%;
  left:50%;
  width:90%;
  max-width:420px;
  max-height:70vh;
  overflow:auto;

  /* fallback kalau gambar gak ada */
  background: linear-gradient(135deg,#fff,#ffe4ec);

  /* kalau ada gambar */
  background-image: url("letter.png");
  background-size:cover;
  background-position:center;

  border-radius:18px;
  padding:25px 20px;
  color:#2b2b2b;
  font-size:15px;

  transform:translateX(-50%) translateY(80px) scale(0.85);
  opacity:0;
  transition:all 0.8s ease;

  z-index:20; /* FIX: lebih tinggi dari amplop */
}

.letter.show{
  display:block;
  opacity:1;
  transform:translateX(-50%) translateY(-60px) scale(1);
}

/* CLOSE */
.close{
  position:absolute;
  right:15px;
  top:10px;
  cursor:pointer;
}

/* TEXT */
.char{
  display:inline-block;
  opacity:0;
  transform:translateY(10px);
  animation:fadeIn 0.4s forwards;
}
@keyframes fadeIn{
  to{opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media (max-width:600px){
  h1{font-size:22px;}
  h2{font-size:18px;}
}
</style>
</head>

<body>

<div class="navbar">
  <a href="#">Home</a>
  <a href="#">Kenangan</a>
  <a href="#">Tentang</a>
  <a href="#">Pembuat</a>
</div>

<div class="card">
<h1>🎉 Selamat Ulang Tahun 🎂</h1>
<h2>Rachel Sandra Mariam</h2>
<img src="hbdachel.jpg" class="profile"><br>
<img src="cake.jpg" class="cake"><br>
<div class="btn" onclick="start()">Ambil Surat</div>
</div>

<div class="envelope" id="env" onclick="openEnvelope()">
  <div class="env-body">
    <div class="flap"></div>
  </div>
</div>

<div class="letter" id="letter1">
  <div class="close" onclick="closeLetter()">❌</div>
  <p id="text1"></p>
</div>

<div class="letter" id="letter2">
  <div class="close" onclick="closeLetter()">❌</div>
  <p id="text2"></p>
</div>

<script>
let state=0;

function start(){
  env.style.display="block";
}

function openEnvelope(){
  env.classList.add("open");

  setTimeout(()=>{
    letter1.classList.add("show");
    type1();
    state=1;
  },600);
}

function closeLetter(){
  letter1.classList.remove("show");
  letter2.classList.remove("show");
  env.style.display="none";
  state=0;
}

/* TEXT */
const msg1="HAPPY BIRTHDAY 🎉\nSemoga bahagia selalu ✨";
const msg2="Makasih ya udah ada 😊";

function type1(){
  let i=0;
  text1.innerHTML="";
  let int=setInterval(()=>{
    if(i<msg1.length){
      let s=document.createElement("span");
      s.className="char";
      s.textContent=msg1[i];
      text1.appendChild(s);
      i++;
    }else clearInterval(int);
  },30);
}

function type2(){
  let i=0;
  text2.innerHTML="";
  let int=setInterval(()=>{
    if(i<msg2.length){
      let s=document.createElement("span");
      s.className="char";
      s.textContent=msg2[i];
      text2.appendChild(s);
      i++;
    }else clearInterval(int);
  },30);
}

document.addEventListener("click",(e)=>{
  if(e.target.closest(".btn")||e.target.closest(".envelope")) return;
  if(state===1){
    letter1.classList.remove("show");
    letter2.classList.add("show");
    type2();
    state=2;
  }
});
</script>

</body>
</html>
